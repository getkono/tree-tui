name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@v4
      - name: Format check
        run: mise run fmt-check
      - name: Clippy
        run: mise run lint
      - name: Test
        run: mise run test

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    # Only PRs carry an unmerged commit series worth linting; pushes to master are history.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # convco needs full history to walk the commit range
      # mise provisions convco (see mise.toml); the build is cached across runs.
      - uses: jdx/mise-action@v4
      - name: Conventional Commits check
        run: convco check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
